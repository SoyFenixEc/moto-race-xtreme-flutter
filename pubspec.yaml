name: moto_race_xtreme
description: "Moto Racer Extreme - Juego de carreras"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0  # 👈 CAMBIADO de 3.11.0 a 3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_inappwebview: ^6.1.5
  google_mobile_ads: ^5.2.0
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  shared_preferences: ^2.3.0
  path_provider: ^2.1.5
  http: ^1.2.2
  url_launcher: ^6.3.1
  permission_handler: ^11.3.0
  package_info_plus: ^8.1.0
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0  # 👈 CAMBIADO de 6.0.0 a 5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/icon/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"
  adaptive_icon_background: "#0a0a1a"
  adaptive_icon_foreground: "assets/icon/logo.png"